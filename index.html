<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Khám Phá Vịnh Hạ Long - Hoạt Hình 9.2</title>
    <style>
        /* === TỔNG THỂ === */
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #0f172a;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            overflow: hidden;
        }

        #game-container {
            width: 900px;
            height: 600px;
            background: #fff;
            position: relative;
            border-radius: 24px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            border: 6px solid #334155;
            overflow: hidden;
        }

        .screen { display: none; width: 100%; height: 100%; position: absolute; top: 0; left: 0; }
        .screen.active { display: flex; flex-direction: column; align-items: center; justify-content: center; }

        /* --- MÀN HÌNH BẮT ĐẦU --- */
        #start-screen {
            background: linear-gradient(rgba(0,0,0,0.5), rgba(0,0,0,0.5)), 
                        url('https://images.unsplash.com/photo-1528127269322-539801943592?q=80&w=2070&auto=format&fit=crop') center/cover;
        }

        .curved-svg { width: 850px; height: 200px; filter: drop-shadow(3px 5px 2px rgba(0,0,0,0.5)); }
        .curved-svg text { font-size: 45px; font-weight: 900; fill: #ffde59; text-transform: uppercase; }

        /* --- MÀN HÌNH BẢN ĐỒ --- */
        #map-screen { 
            background: #0ea5e9;
            background-image: 
                radial-gradient(circle at 30% 20%, #38bdf8 5%, transparent 25%),
                linear-gradient(180deg, #0ea5e9 0%, #0284c7 100%);
        }

        .island-obj {
            position: absolute;
            width: 120px;
            height: 120px;
            background-color: rgba(255, 255, 255, 0.2); 
            border: 3px solid rgba(255, 255, 255, 0.4);
            border-radius: 25px; 
            cursor: pointer;
            display: flex;
            justify-content: center;
            align-items: center;
            transition: 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            animation: float-island 4s ease-in-out infinite;
            box-shadow: 0 10px 20px rgba(0,0,0,0.2);
        }

        @keyframes float-island {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-15px); }
        }

        .island-img {
            position: absolute;
            width: 85%;
            height: 85%;
            object-fit: contain;
            content: url('https://cdn-icons-png.flaticon.com/512/3222/3222792.png');
            filter: drop-shadow(2px 4px 6px rgba(0,0,0,0.3));
        }

        .island-number {
            position: relative;
            color: #ffffff;
            font-size: 45px;
            font-weight: 900;
            text-shadow: 2px 2px 8px rgba(0,0,0,0.8);
            z-index: 10;
        }

        .island-obj:hover { transform: scale(1.1) !important; background-color: rgba(255,255,255,0.4); }
        .island-obj.solved { filter: grayscale(1); opacity: 0.5; pointer-events: none; }

        /* --- MÀN HÌNH CÂU HỎI --- */
        #quiz-screen { background: #f1f5f9; }
        .img-wrapper { 
            width: 500px; height: 320px; background: #cbd5e1; 
            margin-bottom: 20px; border-radius: 20px; border: 6px solid #fff;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1); overflow: hidden;
            display: flex; align-items: center; justify-content: center;
        }
        #quiz-img { width: 100%; height: 100%; object-fit: cover; }

        .options-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; width: 600px; }
        
        .btn-choice { 
            padding: 15px; background: #fff; border: 2px solid #e2e8f0; border-radius: 12px; 
            font-size: 18px; font-weight: bold; cursor: pointer; transition: 0.2s;
        }
        
        .btn-choice:hover { 
            border-color: #3b82f6; 
            background: #f0f7ff; 
            transform: scale(1.05); 
            box-shadow: 0 0 15px rgba(59, 130, 246, 0.5);
        }

        .play-btn {
            padding: 15px 50px; font-size: 24px; font-weight: bold; color: #fff;
            background: #2563eb; border: none; border-radius: 50px; cursor: pointer;
            box-shadow: 0 10px 20px rgba(0,0,0,0.2);
            transition: 0.2s; 
        }

        .play-btn:hover { 
            transform: scale(1.05); 
            box-shadow: 0 0 25px rgba(37, 99, 235, 0.8);
        }

        #end-screen { background: #064e3b; color: white; }
    </style>
</head>
<body>

    <div id="game-container">
        <audio id="audio-correct" src="https://assets.mixkit.co/active_storage/sfx/2013/2013-preview.mp3"></audio>
        <audio id="audio-wrong" src="https://assets.mixkit.co/active_storage/sfx/2018/2018-preview.mp3"></audio>
        <audio id="audio-win" src="https://assets.mixkit.co/active_storage/sfx/1435/1435-preview.mp3"></audio>

        <div id="start-screen" class="screen active">
            <svg class="curved-svg" viewBox="0 0 800 200">
                <path id="curvePath" d="M100,160 Q400,20 700,160" fill="transparent" />
                <text><textPath xlink:href="#curvePath" startOffset="50%" text-anchor="middle">KHÁM PHÁ VỊNH HẠ LONG</textPath></text>
            </svg>
            <button class="play-btn" onclick="startGame()">BẮT ĐẦU CHƠI</button>
        </div>

        <div id="map-screen" class="screen">
            <div class="island-obj" id="island-0" style="top: 15%; left: 15%;" onclick="openQuiz(0)">
                <div class="island-img"></div>
                <div class="island-number">1</div>
            </div>
            <div class="island-obj" id="island-1" style="top: 10%; left: 55%;" onclick="openQuiz(1)">
                <div class="island-img"></div>
                <div class="island-number">2</div>
            </div>
            <div class="island-obj" id="island-2" style="top: 45%; left: 75%;" onclick="openQuiz(2)">
                <div class="island-img"></div>
                <div class="island-number">3</div>
            </div>
            <div class="island-obj" id="island-3" style="top: 70%; left: 45%;" onclick="openQuiz(3)">
                <div class="island-img"></div>
                <div class="island-number">4</div>
            </div>
            <div class="island-obj" id="island-4" style="top: 60%; left: 10%;" onclick="openQuiz(4)">
                <div class="island-img"></div>
                <div class="island-number">5</div>
            </div>
        </div>

        <div id="quiz-screen" class="screen">
            <div class="img-wrapper">
                <img id="quiz-img" src="" alt="Câu hỏi">
            </div>
            <div class="options-grid">
                <button class="btn-choice" onclick="checkAnswer(0)"></button>
                <button class="btn-choice" onclick="checkAnswer(1)"></button>
                <button class="btn-choice" onclick="checkAnswer(2)"></button>
                <button class="btn-choice" onclick="checkAnswer(3)"></button>
            </div>
            <p id="message" style="font-weight:bold; font-size:26px; margin-top:15px;"></p>
        </div>

        <div id="end-screen" class="screen">
            <h1>CHÚC MỪNG! 🎉</h1>
            <p style="font-size: 24px;">Bạn đã khám phá Vịnh Hạ Long cùng lớp 9.2!</p>
            <button class="play-btn" onclick="location.reload()">CHƠI LẠI</button>
        </div>
    </div>

    <script>
        const quizData = [
            { 
                img: "https://i.ibb.co/MyL56Jvs/trongmai.webp", 
                options: ["Hòn Trống Mái", "Hòn Đỉnh Hương", "Hòn Con Cóc", "Hòn Gà Chọi"], 
                correct: 0 
            },
            { 
                img: "https://i.ibb.co/KjYb6jFn/titop.webp", 
                options: ["Đảo Tuần Châu", "Đảo Ti Tốp", "Đảo Cát Bà", "Đảo Quan Lạn"], 
                correct: 1 
            },
            { 
                img: "https://i.ibb.co/nsG4TGXs/hangsungsot.webp", 
                options: ["Hang Luồn", "Động Thiên Cung", "Hang Đầu Gỗ", "Hang Sửng Sốt"], 
                correct: 3 
            },
            { 
                img: "https://i.ibb.co/YFHZKQg9/dinhhuong.webp", 
                options: ["Hòn Đỉnh Hương", "Hòn Móng Tay", "Hòn Trống", "Hòn Mái"], 
                correct: 0 
            },
            { 
                img: "https://i.ibb.co/KpYTS12m/dao-bo-hon-ha-long.jpg", 
                options: ["Đảo Tuần Châu", "Đảo Soi Sim", "Đảo Bồ Hòn", "Đảo Ngọc Vừng"], 
                correct: 2 
            }
        ];

        let solvedCount = 0;
        let currentIdx = -1;
        let isSolved = [false, false, false, false, false];

        // Thiết lập âm lượng nhẹ nhàng (0.0 -> 1.0)
        const sounds = {
            correct: document.getElementById('audio-correct'),
            wrong: document.getElementById('audio-wrong'),
            win: document.getElementById('audio-win')
        };
        Object.values(sounds).forEach(s => s.volume = 0.5);

        function showScreen(id) {
            document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
            document.getElementById(id).classList.add('active');
        }

        function startGame() { showScreen('map-screen'); }

        function openQuiz(idx) {
            currentIdx = idx;
            const data = quizData[idx];
            document.getElementById('quiz-img').src = data.img;
            const btns = document.querySelectorAll('.btn-choice');
            btns.forEach((btn, i) => {
                btn.innerText = data.options[i];
                btn.style.backgroundColor = "white";
                btn.style.borderColor = "#e2e8f0";
            });
            document.getElementById('message').innerText = "";
            showScreen('quiz-screen');
        }

        function checkAnswer(selected) {
            const data = quizData[currentIdx];
            const msg = document.getElementById('message');
            const btns = document.querySelectorAll('.btn-choice');
            
            if (selected === data.correct) {
                sounds.correct.currentTime = 0; // Chơi từ đầu nếu bấm nhanh
                sounds.correct.play();
                msg.innerText = "GIỎI QUÁ TA! 🎉";
                msg.style.color = "#16a34a";
                btns[selected].style.backgroundColor = "#dcfce7";
                
                if (!isSolved[currentIdx]) {
                    isSolved[currentIdx] = true;
                    solvedCount++;
                    document.getElementById(`island-${currentIdx}`).classList.add('solved');
                }
                setTimeout(() => {
                    if (solvedCount === 5) {
                        sounds.win.play();
                        showScreen('end-screen');
                    }
                    else showScreen('map-screen');
                }, 1000);
            } else {
                sounds.wrong.currentTime = 0;
                sounds.wrong.play();
                msg.innerText = "HỔNG ĐÚNG RỒI! ❌";
                msg.style.color = "#dc2626";
                btns[selected].style.backgroundColor = "#fee2e2";
                setTimeout(() => showScreen('map-screen'), 1200);
            }
        }
    </script>
</body>
</html>
